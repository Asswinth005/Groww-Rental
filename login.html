<head>

    <!-- Tailwind + your admin theme colors -->

        tailwind.config = {

    <!-- Fonts: Poppins + Cormorant Garamond (same as admin) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ----- FULL SCREEN, NO SCROLL ----- */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #FAF8F6;  /* bg-warm */
            color: #2A2A2A;              /* neutral-dark */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: 'Poppins', system-ui, sans-serif;
        }
        .dark body {
            background-color: #0a0a0a;    /* dark-bg */
            color: #ffffff;
        }

        /* toggle buttons — top-right, using admin style */
        .theme-toggle-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }
        
        .toggle-btn {
            width: 42px; 
            height: 42px; 
            border-radius: 50%;            /* round like admin */
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            background: #E8E2DC;            /* neutral-light variant */
            color: #2A2A2A;
            transition: all 0.2s ease; 
            border: none; 
            cursor: pointer;
            font-size: 1.1rem;
        }
        .dark .toggle-btn { 
            background: #2a2a2a;            /* dark-surface */
            color: #e0e0e0; 
        }
        .toggle-btn:hover { 
            background: #5A0E24;             /* primary */
            color: white; 
        }
        .dark .toggle-btn:hover { 
            background: #B24C6B;              /* primary-light */
            color: white; 
        }
        .toggle-btn.active { 
            background: #5A0E24; 
            color: white; 
        }
        .dark .toggle-btn.active { 
            background: #B24C6B; 
            color: white; 
        }

        /* LOGIN CARD — using admin dashboard-card style */
        .login-card {
            background: white;
            border-radius: 32px;                /* matches dashboard-card */
            padding: 2.2rem 2rem 2rem;
            box-shadow: 0 8px 28px rgba(90,14,36,0.06);
            border: 1px solid rgba(90,14,36,0.1);
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        .dark .login-card {
            background: #1e1e1e;                 /* dark-card */
            border-color: #333;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .login-card:hover {
            border-color: #5A0E24;
            box-shadow: 0 12px 32px rgba(90,14,36,0.12);
        }

        /* input — admin style with icon padding */
        .login-input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 3rem;
            border-radius: 40px;                  /* admin-input rounded */
            border: 1.5px solid #EEEAE6;
            background: #FAF8F6;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #1a1a1a;
            font-family: 'Poppins', sans-serif;
        }
        .dark .login-input {
            background: #2a2a2a;                   /* dark-surface */
            border-color: #444;
            color: #fff;
        }
        .login-input:focus {
            outline: none;
            border-color: #5A0E24;
            background: white;
            box-shadow: 0 0 0 4px rgba(90,14,36,0.1);
        }
        .dark .login-input:focus {
            border-color: #B24C6B;
            box-shadow: 0 0 0 4px rgba(178,76,107,0.2);
        }

        /* adventure btn → admin primary button */
        .admin-btn {
            background: #5A0E24;
            color: white;
            font-weight: 600;
            padding: 0.9rem 2.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            width: 100%;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .admin-btn:hover {
            background: #3F081B;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(90,14,36,0.3);
        }
        .dark .admin-btn {
            background: #B24C6B;
            color: white;
        }
        .dark .admin-btn:hover {
            background: #8A3A55;
            box-shadow: 0 12px 28px rgba(178,76,107,0.3);
        }

        /* social login buttons — side by side with admin styling */
        .social-btn-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }
        
        .social-btn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            border-radius: 40px;
            border: 1.5px solid #EEEAE6;
            background: white;
            color: #2A2A2A;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            gap: 0.5rem;
            white-space: nowrap;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        .dark .social-btn {
            background: #2a2a2a;
            border-color: #444;
            color: #e5e5e5;
        }
        .social-btn:hover {
            border-color: #5A0E24;
            transform: translateY(-2px);
            background: white;
        }
        .dark .social-btn:hover {
            border-color: #B24C6B;
            background: #2a2a2a;
        }
        .social-btn i {
            font-size: 1.1rem;
            color: #5A0E24;
        }
        .dark .social-btn i {
            color: #B24C6B;
        }

        /* logo icon hover */
        .logo-icon {
            transition: transform 0.3s ease;
        }
        a:hover .logo-icon {
            transform: rotate(8deg);
        }

        /* RTL adjustments */
        [dir="rtl"] .login-input { padding: 0.85rem 3rem 0.85rem 1.2rem; }
        [dir="rtl"] .input-icon { left: auto; right: 1.1rem; }
        [dir="rtl"] .fa-arrow-right { transform: scaleX(-1); }
        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 20px;
        }
        /* RTL adjustment for password eye icon */
        [dir="rtl"] .password-eye {
            right: auto;
            left: 1rem;
        }

        /* container */
        .container-tight {
            max-width: 480px;
            width: 100%;
            padding: 0 1.2rem;
        }

        /* center logo column */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.8rem;
        }

        /* welcome title using display font */
        .welcome-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #2A2A2A;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
            text-align: center;
            line-height: 1.2;
        }
        .dark .welcome-title {
            color: white;
        }

        .welcome-subtitle {
            font-size: 0.9rem;
            color: rgba(42, 42, 42, 0.7);
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .dark .welcome-subtitle {
            color: #9CA3AF;
        }

        /* Password eye icon styling - perfectly integrated */
        .password-eye {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: #5A0E24;
            font-size: 1.1rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 5;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
        }
        .dark .password-eye {
            color: #B24C6B;
        }
        .password-eye:hover {
            background: rgba(90,14,36,0.08);
            transform: translateY(-50%) scale(1.05);
        }
        .dark .password-eye:hover {
            background: rgba(178,76,107,0.15);
        }
        /* Ensure password field padding respects eye icon */
        .password-wrapper .login-input {
            padding-right: 3rem;
        }
        /* RTL mirror for eye icon */
        [dir="rtl"] .password-eye {
            right: auto;
            left: 1rem;
        }
        [dir="rtl"] .password-wrapper .login-input {
            padding-left: 3rem;
            padding-right: 1.2rem;
        }

        /* mobile adjustments */
        @media (max-width: 380px) {
            .social-btn-row {
                flex-direction: column;
            }
            .login-card {
                padding: 1.8rem 1.5rem;
            }
        }
        @media (max-width: 480px) {
            .theme-toggle-wrapper {
                top: 12px;
                right: 12px;
            }
            [dir="rtl"] .theme-toggle-wrapper {
                left: 12px;
            }
        }

        /* hidden utility */
        .hidden { display: none; }
    </style>
</head>
<body class="bg-bg-warm dark:bg-dark-bg">

    <!-- ===== THEME TOGGLES - TOP RIGHT ===== -->
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="toggle-btn" title="Dark / Light">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun hidden"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn" title="RTL / LTR">
            ⇄
        </button>
    </div>

    <!-- ===== LOGIN CARD (ELITE STUDIO theme) ===== -->
    <div class="container-tight">
        
        <div class="login-card animate-fade-in">
            
            <!-- ===== LOGO - CENTERED: ELITE STUDIO ===== -->
            <div class="logo-center">
                <a href="index.html" class="flex items-center space-x-3 rtl:space-x-reverse group">

            </div>
            
        </div> <!-- end login-card -->

        
    </div>

  

    <!-- ===== TOGGLE SCRIPT + PASSWORD EYE TOGGLE (ADDED WITHOUT ALTERING OTHER FUNCTIONALITY) ===== -->
    <script>
        (function() {
            // ---------- THEME ----------
            const themeToggle = document.getElementById('theme-toggle');
            const themeIconMoon = themeToggle?.querySelector('.fa-moon');
            const themeIconSun = themeToggle?.querySelector('.fa-sun');

            function setTheme(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    if (themeIconMoon) themeIconMoon.classList.add('hidden');
                    if (themeIconSun) themeIconSun.classList.remove('hidden');
                    themeToggle?.classList.add('active');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    if (themeIconMoon) themeIconMoon.classList.remove('hidden');
                    if (themeIconSun) themeIconSun.classList.add('hidden');
                    themeToggle?.classList.remove('active');
                    localStorage.setItem('theme', 'light');
                }
            }
            const savedTheme = localStorage.getItem('theme');
            savedTheme === 'dark' ? setTheme(true) : setTheme(false);

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    setTheme(!document.documentElement.classList.contains('dark'));
                });
            }

            // ---------- RTL ----------
            const rtlBtn = document.getElementById('rtl-toggle');
            function setRTL(isRTL) {
                if (isRTL) {
                    document.documentElement.dir = 'rtl';
                    document.documentElement.lang = 'ar';
                    rtlBtn?.classList.add('active');
                    localStorage.setItem('dir', 'rtl');
                } else {
                    document.documentElement.dir = 'ltr';
                    document.documentElement.lang = 'en';
                    rtlBtn?.classList.remove('active');
                    localStorage.setItem('dir', 'ltr');
                }
            }
            const savedDir = localStorage.getItem('dir');
            savedDir === 'rtl' ? setRTL(true) : setRTL(false);

            if (rtlBtn) {
                rtlBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setRTL(document.documentElement.dir !== 'rtl');
                });
            }

            // ---------- PASSWORD EYE TOGGLE (NEW FEATURE - INTEGRATED SEAMLESSLY) ----------
            const passwordField = document.getElementById('login-password');
            const togglePasswordBtn = document.getElementById('toggle-password-visibility');
            const eyeIcon = document.getElementById('password-eye-icon');
            
            if (passwordField && togglePasswordBtn && eyeIcon) {
                togglePasswordBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    // Toggle the type attribute
                    const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordField.setAttribute('type', type);
                    
                    // Toggle the icon classes (between fa-eye-slash and fa-eye)
                    if (type === 'text') {
                        eyeIcon.classList.remove('fa-eye-slash');
                        eyeIcon.classList.add('fa-eye');
                        togglePasswordBtn.setAttribute('aria-label', 'Hide password');
                    } else {
                        eyeIcon.classList.remove('fa-eye');
                        eyeIcon.classList.add('fa-eye-slash');
                        togglePasswordBtn.setAttribute('aria-label', 'Show password');
                    }
                });
                
                // Optional: Add keyboard accessibility (Enter/Space on button)
                togglePasswordBtn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        togglePasswordBtn.click();
                    }
                });
            }

            // ---------- FORGOT PASSWORD DEMO ----------
            document.querySelectorAll('a[href="#"]').forEach(link => {
                if (link.textContent.includes('Forgot') || link.innerHTML.includes('Forgot')) {
                    link.addEventListener('click', (e) => { 
                        e.preventDefault(); 
                        alert('🔐 Password reset demo — would send email'); 
                    });
                }
            });

            // demo for social buttons (already have onclick, but keep console clean)
            console.log('Login page — ELITE STUDIO theme loaded with password visibility toggle');
        })();
    </script>
</body>
