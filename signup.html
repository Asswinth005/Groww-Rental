    <!-- Tailwind + your admin theme colors -->

    <!-- Fonts: Poppins + Cormorant Garamond (same as admin) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ----- FULL SCREEN, NO SCROLL ----- */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #FAF8F6;  /* bg-warm */
            color: #2A2A2A;              /* neutral-dark */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: 'Poppins', system-ui, sans-serif;
        }
        .dark body {
            background-color: #0a0a0a;    /* dark-bg */
            color: #ffffff;
        }

        /* toggle buttons — top-right, using admin style */
        .theme-toggle-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }
        
        .toggle-btn {
            width: 42px; 
            height: 42px; 
            border-radius: 50%;            /* round like admin */
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            background: #E8E2DC;            /* neutral-light variant */
            color: #2A2A2A;
            transition: all 0.2s ease; 
            border: none; 
            cursor: pointer;
            font-size: 1.1rem;
        }
        .dark .toggle-btn { 
            background: #2a2a2a;            /* dark-surface */
            color: #e0e0e0; 
        }
        .toggle-btn:hover { 
            background: #5A0E24;             /* primary */
            color: white; 
        }
        .dark .toggle-btn:hover { 
            background: #B24C6B;              /* primary-light */
            color: white; 
        }
        .toggle-btn.active { 
            background: #5A0E24; 
            color: white; 
        }
        .dark .toggle-btn.active { 
            background: #B24C6B; 
            color: white; 
        }

        /* SIGNUP CARD — using admin dashboard-card style (matches login) */
        .signup-card {
            background: white;
            border-radius: 32px;                /* matches dashboard-card */
            padding: 2.2rem 2rem 2rem;
            box-shadow: 0 8px 28px rgba(90,14,36,0.06);
            border: 1px solid rgba(90,14,36,0.1);
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        .dark .signup-card {
            background: #1e1e1e;                 /* dark-card */
            border-color: #333;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .signup-card:hover {
            border-color: #5A0E24;
            box-shadow: 0 12px 32px rgba(90,14,36,0.12);
        }

        /* input — admin style with icon padding */
        .signup-input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 3rem;
            border-radius: 40px;                  /* admin-input rounded */
            border: 1.5px solid #EEEAE6;
            background: #FAF8F6;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #1a1a1a;
            font-family: 'Poppins', sans-serif;
        }
        .dark .signup-input {
            background: #2a2a2a;                   /* dark-surface */
            border-color: #444;
            color: #fff;
        }
        .signup-input:focus {
            outline: none;
            border-color: #5A0E24;
            background: white;
            box-shadow: 0 0 0 4px rgba(90,14,36,0.1);
        }
        .dark .signup-input:focus {
            border-color: #B24C6B;
            box-shadow: 0 0 0 4px rgba(178,76,107,0.2);
        }

        /* adventure btn → admin primary button */
        .admin-btn {
            background: #5A0E24;
            color: white;
            font-weight: 600;
            padding: 0.9rem 2.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            width: 100%;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .admin-btn:hover {
            background: #3F081B;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(90,14,36,0.3);
        }
        .dark .admin-btn {
            background: #B24C6B;
            color: white;
        }
        .dark .admin-btn:hover {
            background: #8A3A55;
            box-shadow: 0 12px 28px rgba(178,76,107,0.3);
        }

        /* social login buttons — side by side with admin styling */
        .social-btn-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }
        
        .social-btn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            border-radius: 40px;
            border: 1.5px solid #EEEAE6;
            background: white;
            color: #2A2A2A;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            gap: 0.5rem;
            white-space: nowrap;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        .dark .social-btn {
            background: #2a2a2a;
            border-color: #444;
            color: #e5e5e5;
        }
        .social-btn:hover {
            border-color: #5A0E24;
            transform: translateY(-2px);
            background: white;
        }
        .dark .social-btn:hover {
            border-color: #B24C6B;
            background: #2a2a2a;
        }
        .social-btn i {
            font-size: 1.1rem;
            color: #5A0E24;
        }
        .dark .social-btn i {
            color: #B24C6B;
        }

        /* logo icon hover */
        .logo-icon {
            transition: transform 0.3s ease;
        }
        a:hover .logo-icon {
            transform: rotate(8deg);
        }

        /* Password eye icon styling - perfectly integrated for signup */
        .password-eye {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: #5A0E24;
            font-size: 1.1rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 5;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
        }
        .dark .password-eye {
            color: #B24C6B;
        }
        .password-eye:hover {
            background: rgba(90,14,36,0.08);
            transform: translateY(-50%) scale(1.05);
        }
        .dark .password-eye:hover {
            background: rgba(178,76,107,0.15);
        }
        /* Ensure password field padding respects eye icon */
        .password-wrapper .signup-input {
            padding-right: 3rem;
        }
        /* RTL mirror for eye icon */
        [dir="rtl"] .password-eye {
            right: auto;
            left: 1rem;
        }
        [dir="rtl"] .password-wrapper .signup-input {
            padding-left: 3rem;
            padding-right: 1.2rem;
        }

        /* RTL adjustments */
        [dir="rtl"] .signup-input { padding: 0.85rem 3rem 0.85rem 1.2rem; }
        [dir="rtl"] .input-icon { left: auto; right: 1.1rem; }
        [dir="rtl"] .fa-arrow-right { transform: scaleX(-1); }
        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 20px;
        }

        /* container */
        .container-tight {
            max-width: 480px;
            width: 100%;
            padding: 0 1.2rem;
        }

        /* center logo column */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        /* welcome title using display font */
        .welcome-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #2A2A2A;
            margin-top: 1rem;
            margin-bottom: 0.15rem;
            text-align: center;
            line-height: 1.2;
        }
        .dark .welcome-title {
            color: white;
        }

        .welcome-subtitle {
            font-size: 0.9rem;
            color: rgba(42, 42, 42, 0.7);
            text-align: center;
            margin-bottom: 0.8rem;
        }
        .dark .welcome-subtitle {
            color: #9CA3AF;
        }

        /* terms text style */
        .terms-text {
            font-size: 0.75rem;
            color: #6B7280;
        }
        .dark .terms-text {
            color: #9CA3AF;
        }
        .terms-link {
            color: #5A0E24;
            font-weight: 500;
        }
        .terms-link:hover {
            text-decoration: underline;
        }
        .dark .terms-link {
            color: #B24C6B;
        }

        /* mobile adjustments */
        @media (max-width: 380px) {
            .social-btn-row {
                flex-direction: column;
            }
            .signup-card {
                padding: 1.8rem 1.5rem;
            }
            .welcome-title {
                font-size: 1.6rem;
            }
        }
        @media (max-width: 480px) {
            .theme-toggle-wrapper {
                top: 12px;
                right: 12px;
            }
            [dir="rtl"] .theme-toggle-wrapper {
                left: 12px;
            }
        }

        /* hidden utility */
        .hidden { display: none; }
    </style>
</head>
<body class="bg-bg-warm dark:bg-dark-bg">

    <!-- ===== THEME TOGGLES - TOP RIGHT ===== -->
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="toggle-btn" title="Dark / Light">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun hidden"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn" title="RTL / LTR">
            ⇄
        </button>

    <!-- ===== SIGNUP CARD (ELITE STUDIO theme) ===== -->
    <div class="container-tight">
        
        <div class="signup-card animate-fade-in">
            
            <!-- ===== LOGO - CENTERED: ELITE STUDIO ===== -->
            <div class="logo-center">
                <a href="index.html" class="flex items-center space-x-3 rtl:space-x-reverse group">
                    <div class="logo-icon w-10 h-10 bg-primary rounded-xl flex items-center justify-center transform group-hover:scale-105 transition-transform">
                        <i class="fas fa-camera-retro text-white text-lg"></i>
                    </div>
                    <div class="font-display text-2xl font-bold tracking-tight">
                        <span class="text-neutral-dark dark:text-white">ELITE</span>
                        <span class="text-primary dark:text-primary-light ml-1">STUDIO</span>

                <h1 class="welcome-title">Join Us Today</h1>
                <p class="welcome-subtitle">Create your account and start creating</p>
            </div>

            <!-- ===== SIGNUP FORM (redirects to admin dashboard after signup) ===== -->
            <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='login.html';">
                
                <!-- full name field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-primary dark:text-primary-light input-icon">

                    </span>

                <!-- email field -->
                <div class="relative">

                        <i class="fas fa-envelope w-5 text-sm"></i>
                    </span>
                    <input type="email" name="email" placeholder="Email address" required

                <!-- password field WITH EYE ICON -->
                <div class="relative password-wrapper">

                    <input type="password" name="password" id="signup-password" placeholder="Password" required

                        <i class="far fa-eye-slash" id="signup-password-icon"></i>

                </div>

                <!-- confirm password field WITH EYE ICON -->
                <div class="relative password-wrapper">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-primary dark:text-primary-light input-icon">
                        <i class="fas fa-lock w-5 text-sm"></i>
                    </span>
                    <input type="password" name="confirm_password" id="signup-confirm-password" placeholder="Confirm password" required
                           class="signup-input text-sm md:text-base" autocomplete="new-password">
                    <button type="button" id="toggle-confirm-password" class="password-eye" aria-label="Show password">
                        <i class="far fa-eye-slash" id="confirm-password-icon"></i>
                    </button>
                </div>

                <!-- terms and conditions checkbox -->
                <div class="flex items-start space-x-2 rtl:space-x-reverse mt-2">
                    <input type="checkbox" id="terms" class="mt-1 rounded border-neutral-light dark:border-gray-600 text-primary focus:ring-primary/30 dark:bg-gray-700" required>
                    <label for="terms" class="terms-text text-xs md:text-sm text-neutral-dark/70 dark:text-gray-400">

                </div>

                <!-- SIGN UP BUTTON (admin style) -->
                <button type="submit" class="admin-btn mt-2">
                    <i class="fas fa-user-plus mr-2 rtl:ml-2 rtl:mr-0"></i>
                    Create account

            <!-- ===== LOGIN LINK ===== -->
            <div class="mt-4 text-center">
                <span class="text-xs text-neutral-dark/60 dark:text-gray-400">Already have an account?</span>
                <a href="login.html" class="text-xs font-semibold text-primary dark:text-primary-light hover:text-primary-dark ml-1 rtl:mr-1 hover:underline">
                    Sign in
                </a>
            </div>
            
            <!-- optional social signup (can be added later) -->
                        
        </div> <!-- end signup-card -->

        <!-- trust badges (colors updated) -->
        <div class="flex justify-center gap-4 mt-3 text-[0.65rem] md:text-xs text-neutral-dark/50 dark:text-gray-500">
            <span class="flex items-center"><i class="fas fa-shield-alt text-primary mr-1"></i> secure</span>
            <span class="flex items-center"><i class="fas fa-headset text-primary mr-1"></i> 24/7</span>
            <span class="flex items-center"><i class="fas fa-globe text-primary mr-1"></i> 50+ countries</span>
        </div>
    </div>

    <!-- footer -->
    <div class="container-tight mt-1 text-center text-[0.6rem] text-neutral-dark/30 dark:text-gray-600 border-t border-primary/10 dark:border-gray-800/40 pt-3">
        © 2026 ELITE STUDIO · <a href="index.html" class="text-primary dark:text-primary-light hover:underline">Home</a>
    </div>

    <!-- ===== TOGGLE SCRIPT + PASSWORD EYE TOGGLES (ADDED WITHOUT ALTERING OTHER FUNCTIONALITY) ===== -->
    <script>
        (function() {
            // ---------- THEME ----------
            const themeToggle = document.getElementById('theme-toggle');
            const themeIconMoon = themeToggle?.querySelector('.fa-moon');
            const themeIconSun = themeToggle?.querySelector('.fa-sun');

            function setTheme(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    if (themeIconMoon) themeIconMoon.classList.add('hidden');
                    if (themeIconSun) themeIconSun.classList.remove('hidden');
                    themeToggle?.classList.add('active');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    if (themeIconMoon) themeIconMoon.classList.remove('hidden');
                    if (themeIconSun) themeIconSun.classList.add('hidden');
                    themeToggle?.classList.remove('active');
                    localStorage.setItem('theme', 'light');
                }
            }
            const savedTheme = localStorage.getItem('theme');
            savedTheme === 'dark' ? setTheme(true) : setTheme(false);

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    setTheme(!document.documentElement.classList.contains('dark'));
                });
            }

            // ---------- RTL ----------
            const rtlBtn = document.getElementById('rtl-toggle');
            function setRTL(isRTL) {
                if (isRTL) {
                    document.documentElement.dir = 'rtl';
                    document.documentElement.lang = 'ar';
                    rtlBtn?.classList.add('active');
                    localStorage.setItem('dir', 'rtl');
                } else {
                    document.documentElement.dir = 'ltr';
                    document.documentElement.lang = 'en';
                    rtlBtn?.classList.remove('active');
                    localStorage.setItem('dir', 'ltr');
                }
            }
            const savedDir = localStorage.getItem('dir');
            savedDir === 'rtl' ? setRTL(true) : setRTL(false);

            if (rtlBtn) {
                rtlBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setRTL(document.documentElement.dir !== 'rtl');
                });
            }

            // ---------- PASSWORD EYE TOGGLE FOR PASSWORD FIELD ----------
            const passwordField = document.getElementById('signup-password');
            const togglePasswordBtn = document.getElementById('toggle-signup-password');
            const passwordEyeIcon = document.getElementById('signup-password-icon');
            
            if (passwordField && togglePasswordBtn && passwordEyeIcon) {
                togglePasswordBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordField.setAttribute('type', type);
                    
                    if (type === 'text') {
                        passwordEyeIcon.classList.remove('fa-eye-slash');
                        passwordEyeIcon.classList.add('fa-eye');
                        togglePasswordBtn.setAttribute('aria-label', 'Hide password');
                    } else {
                        passwordEyeIcon.classList.remove('fa-eye');
                        passwordEyeIcon.classList.add('fa-eye-slash');
                        togglePasswordBtn.setAttribute('aria-label', 'Show password');
                    }
                });
                
                togglePasswordBtn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        togglePasswordBtn.click();
                    }
                });
            }

            // ---------- PASSWORD EYE TOGGLE FOR CONFIRM PASSWORD FIELD ----------
            const confirmPasswordField = document.getElementById('signup-confirm-password');
            const toggleConfirmBtn = document.getElementById('toggle-confirm-password');
            const confirmEyeIcon = document.getElementById('confirm-password-icon');
            
            if (confirmPasswordField && toggleConfirmBtn && confirmEyeIcon) {
                toggleConfirmBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const type = confirmPasswordField.getAttribute('type') === 'password' ? 'text' : 'password';
                    confirmPasswordField.setAttribute('type', type);
                    
                    if (type === 'text') {
                        confirmEyeIcon.classList.remove('fa-eye-slash');
                        confirmEyeIcon.classList.add('fa-eye');
                        toggleConfirmBtn.setAttribute('aria-label', 'Hide password');
                    } else {
                        confirmEyeIcon.classList.remove('fa-eye');
                        confirmEyeIcon.classList.add('fa-eye-slash');
                        toggleConfirmBtn.setAttribute('aria-label', 'Show password');
                    }
                });
                
                toggleConfirmBtn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        toggleConfirmBtn.click();
                    }
                });
            }

            // ---------- DEMO ALERTS (only for Terms/Privacy) ----------
            document.querySelectorAll('a[href="#"]').forEach(link => {
                if (link.textContent.includes('Terms') || link.textContent.includes('Privacy')) {
                    link.addEventListener('click', (e) => { 
                        e.preventDefault(); 
                        alert('📋 Terms & Privacy demo'); 
                    });
                }
            });
            
            console.log('Signup page — ELITE STUDIO theme loaded with password visibility toggles for both password fields');
        })();
    </script>
